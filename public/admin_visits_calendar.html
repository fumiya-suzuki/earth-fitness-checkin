<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Earth Conditioning 来店カレンダー</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  {{template "admin_head" .}}
  <style>
    .calendar-table {
      table-layout: fixed;
    }
    .calendar-table th,
    .calendar-table td {
      vertical-align: top;
      height: 110px;
      border: 1px solid #dee2e6;
      padding: 8px;
      background: #fff;
    }
    .calendar-day {
      font-weight: 700;
      margin-bottom: 8px;
    }
    .calendar-count a {
      font-weight: 700;
      color: #0d6efd;
      text-decoration: none;
    }
    .calendar-count a:hover {
      text-decoration: underline;
    }
    .empty-cell {
      background: #f8f9fa;
    }
    .sun {
      color: #dc3545;
    }
    .sat {
      color: #20a39e;
    }
    .today-badge {
      font-size: 0.75rem;
      margin-left: 4px;
    }
  </style>
</head>
<body class="bg-light">
  <div class="admin-shell">
    {{template "admin_sidebar" .}}
    <main class="admin-main">
      <div class="container-fluid px-0">

    <h1 class="h3 mb-3">来店カレンダー</h1>

    <div class="d-flex align-items-center justify-content-between border rounded bg-white p-3 mb-3">
      <div class="fw-bold">{{.MonthLabel}}の来店者数</div>
      <div class="fs-3 fw-bold">{{.MonthlyTotal}}人</div>
    </div>

    <div class="btn-group mb-3">
      <a href="/admin/visits/calendar" class="btn btn-sm {{if .IsPrev}}btn-outline-primary{{else}}btn-primary{{end}}">今月</a>
      <a href="/admin/visits/calendar?mode=prev" class="btn btn-sm {{if .IsPrev}}btn-primary{{else}}btn-outline-primary{{end}}">前月</a>
    </div>

    <table class="table calendar-table mb-2">
      <thead class="table-light">
        <tr>
          <th class="sun">日</th>
          <th>月</th>
          <th>火</th>
          <th>水</th>
          <th>木</th>
          <th>金</th>
          <th class="sat">土</th>
        </tr>
      </thead>
      <tbody>
        {{range .Weeks}}
          <tr>
            {{range .Days}}
              {{if .InMonth}}
                <td>
                  <div class="calendar-day {{if eq .Weekday 0}}sun{{else if eq .Weekday 6}}sat{{end}}">
                    {{.Day}}日
                    {{if .IsToday}}<span class="badge text-bg-warning today-badge">今日</span>{{end}}
                  </div>
                  <div class="calendar-count">
                    <a href="{{.DetailURL}}">{{.Count}}人</a>
                  </div>
                </td>
              {{else}}
                <td class="empty-cell"></td>
              {{end}}
            {{end}}
          </tr>
        {{end}}
      </tbody>
    </table>

        <p id="updatedAt" class="text-muted mb-0">最終更新: -</p>
      </div>
    </main>
  </div>

  <script>
    document.addEventListener("DOMContentLoaded", function () {
      const updatedAtEl = document.getElementById("updatedAt");
      const d = new Date();
      const hh = String(d.getHours()).padStart(2, "0");
      const mm = String(d.getMinutes()).padStart(2, "0");
      const ss = String(d.getSeconds()).padStart(2, "0");
      updatedAtEl.textContent = `最終更新: ${hh}:${mm}:${ss}`;

      setInterval(function () {
        location.reload();
      }, 60 * 1000);
    });
  </script>
</body>
</html>
