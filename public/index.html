<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Earth Conditioning CHECK IN</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
  <link rel="stylesheet" href="/style.css?v=13">
</head>
<body>

  <div class="container-fluid checkin-box">
    <div class="row justify-content-center checkin-shell">
      <div class="col-12 checkin-column">
        <div class="card checkin-panel">
          <div class="card-body text-center">
            <div class="store-photo-frame">
              <img src="./store.png" class="store-photo" alt="Earth Conditioning 店内">
            </div>

            <img src="./logo.png" class="brand-logo" alt="Earth Conditioning">

            <p id="result" class="mb-3 text-success text-center"></p>

            <div class="capacity-wrapper mb-3">
              <div class="capacity-icon"><img id="capacityIcon" src="./good.png"></div>
              <div class="capacity-bar">
                <div id="capacityFill" class="capacity-fill"></div>
                <div id="capacityPercent" class="capacity-percent">0%</div>
              </div>
            </div>
            <p id="capacityText" class="capacity-text mb-4"></p>

            <div class="monthly-visit-box mb-3">
              <div class="monthly-visit-label">今月の来店回数</div>
              <div class="monthly-visit-value"><span id="monthlyVisitCount">-</span><span class="monthly-visit-unit">回</span></div>
            </div>

            <p id="profileMessage" class="text-danger mb-2" style="display:none;"></p>

            <div id="profileForm" class="profile-form mb-3" style="display:none;">
              <h2 class="h6 fw-bold mb-2">はじめてのご利用ですか？</h2>
              <p class="mb-2" style="font-size:0.9rem;">
                お名前と会員種別の登録をお願いします。（次回以降は表示されません）
              </p>

              <div class="mb-2">
                <label class="form-label mb-1" for="lastName">姓</label>
                <input type="text" id="lastName" class="form-control form-control-sm" placeholder="例：山田">
              </div>

              <div class="mb-2">
                <label class="form-label mb-1" for="firstName">名</label>
                <input type="text" id="firstName" class="form-control form-control-sm" placeholder="例：太郎">
              </div>

              <div class="mb-3">
                <label class="form-label mb-1">会員種別</label>
                <div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="memberType" id="memberTypeGeneral" value="general" checked>
                    <label class="form-check-label" for="memberTypeGeneral">フリープラン</label>
                  </div>
                  <div class="form-check form-check-inline">
                    <input class="form-check-input" type="radio" name="memberType" id="memberType1day" value="1day">
                    <label class="form-check-label" for="memberType1day">ライトプラン</label>
                  </div>
                </div>
              </div>

              <button id="profileSubmitBtn" class="btn btn-sm btn-primary w-100">
                登録してチェックイン
              </button>
            </div>

            <div class="store-info">
              <div class="store-info-list">
                <p>
                  <img src="./access.png" alt="">
                  <span class="store-info-text">
                    <span class="store-info-title">アクセス</span>
                    JR山手線目黒駅 徒歩8分<br>地下鉄目黒線・南北線目黒駅 徒歩8分
                  </span>
                </p>
                <p>
                  <img src="./map.png" alt="">
                  <span class="store-info-text">
                    <span class="store-info-title">住所</span>
                    東京都目黒区下目黒2-19-6 F&amp;Tビル1階
                  </span>
                </p>
                <p>
                  <img src="./open.png" alt="">
                  <span class="store-info-text">
                    <span class="store-info-title">営業時間</span>
                    平日 10:00~21:30<br>土 10:00~21:00 / 日・祝 10:00~19:00
                  </span>
                </p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="/config.js?v=3"></script>
  <script src="/app.js?v=20260519-03"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
